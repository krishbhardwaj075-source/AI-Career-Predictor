<!DOCTYPE html>
<html>
<head>
<title>AI Career Chatbot</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
</head>
<body>
<div class="chat-wrapper">
<h2>AI Career Assistant</h2>
<div class="chat-box">
{% if user_msg %}
<div class="user-msg">{{ user_msg }}</div>
{% endif %}
{% if bot_msg %}
<div class="bot-msg">{{ bot_msg }}</div>
{% endif %}
</div>

<form method="POST" class="chat-form">

<input type="text" name="message" placeholder="Ask about career..." required>

<button type="submit">Send</button>

</form>

</div>

</body>
</html>
